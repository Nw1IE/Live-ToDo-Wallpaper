<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Live Todo Wallpaper</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Оставляем базовую структуру, если в style.css еще пусто */
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; object-fit: cover; }
        #todo-container { display: flex; justify-content: space-between; width: 100%; height: 100%; box-sizing: border-box; padding: 140px 120px; }
        .card { width: 750px; height: 800px; background: rgba(15, 15, 23, 0.65); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; box-sizing: border-box; padding: 50px; backdrop-filter: blur(8px); }
        h2 { margin: 0 0 40px 0; font-size: 32px; font-weight: bold; }
        .today h2 { color: #f38ba8; }
        .tomorrow h2 { color: #89b4fa; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { font-size: 24px; color: #e1e7fc; margin-bottom: 25px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        li.done { color: rgba(166, 227, 161, 0.6); text-decoration: line-through; }
    </style>
</head>
<body>
    
    <video autoplay muted loop playsinline id="bg-video">
        <source src="/video/video.mp4" type="video/mp4">
    </video>

    <div id="todo-container"></div>

    <script>
        const video = document.getElementById('bg-video');
        document.addEventListener('DOMContentLoaded', () => {
            video.play().catch(() => {
                setTimeout(() => { video.play(); }, 1000);
            });
        });

        function connect() {
            const ws = new WebSocket('ws://localhost:8080');
            ws.onmessage = (event) => { 
                document.getElementById('todo-container').innerHTML = event.data; 
            };
            ws.onclose = () => { setTimeout(connect, 2000); };
        }
        connect();
    </script>
</body>
</html>
